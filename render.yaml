services:
  - type: web
    name: creditiq-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.render.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHONPATH
        value: .
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: APP_SECRET_KEY
        generateValue: true